  <script>const btn = document.getElementById('menu-btn')
    const nav = document.getElementById('menu')

    btn.addEventListener('click', () => {
      btn.classList.toggle('open')
      nav.classList.toggle('flex')
      nav.classList.toggle('hidden')
    })
    const text = window.baffle(".text__glitch");
    text.set({
      characters: "█▓'░ /▓>",
      speed: 200,
    });
    function alpha() {
      text.start();
      text.reveal(4000);
    }
    alpha();
    setInterval(alpha, 8000);

  
    function sendMail() {
      var params = {
        from_name: document.getElementById("name").value,
        email_id: document.getElementById("email").value,
        message: document.getElementById("message").value
      }

      emailjs.send("service_qquu20n", "template_u3kf18w", params).then(function (res) {
        alert("message send.")
      })
      document.getElementById("name").value = "";
      document.getElementById("email").value = "";
      document.getElementById("message").value = "";
    }
    document.getElementById("submit-btn").addEventListener("click", sendMail);
  </script>
